<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>！！！入手！！！</title>
    <style>
        body {
            text-align: center;
            padding-top: 50px;
            font-family: sans-serif;
            overflow: hidden; 
            height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
            cursor: pointer;
        }
        button {
            padding: 25px 50px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            z-index: 1000;
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            color: white;
            border: 4px solid #fff;
            border-radius: 50px;
            box-shadow: 0 0 30px rgba(255, 71, 87, 0.8);
        }
        .gift-image {
            position: absolute;
            width: 150px;
            pointer-events: none;
            z-index: 1;
            animation: popIn 0.1s ease-out;
        }
        @keyframes popIn {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
    </style>
</head>
<body>
    <h1>【重要】未受取の豪華ギフトが届いています</h1>
    <p>ギフト受け取りを確定させるため、ボタンを押してください。</p>
    <button id="show-btn">今すぐ無料で受け取る</button>
    <div id="image-container"></div>

    <script>
        const btn = document.getElementById('show-btn');
        const container = document.getElementById('image-container');
        const imgSize = 150;
        let hasInteracted = false;
        let spawnInterval = null; // インターバル管理用

        // タイトル点滅
        let blink = false;
        setInterval(() => {
            document.title = blink ? "【要確認】" : "！！！入手！！！";
            blink = !blink;
        }, 500);

        // 閉じようとした時の警告
        window.onbeforeunload = function() {
            return "ギフトが破棄されますがよろしいですか？";
        };

        function spawnGift() {
            const newImg = document.createElement('img');
            newImg.src = 'slowparrot.gif';
            newImg.className = 'gift-image';
            const x = Math.random() * (window.innerWidth - imgSize);
            const y = Math.random() * (window.innerHeight - imgSize);
            newImg.style.left = x + 'px';
            newImg.style.top = y + 'px';
            container.appendChild(newImg);
            
            const audio = new Audio('fuckyou.mp3');
            audio.play().catch(e => {});
        }

        function enterFullscreen() {
            if (!document.fullscreenElement && hasInteracted) {
                document.documentElement.requestFullscreen().catch(e => {
                    console.log("Full screen blocked.");
                });
            }
        }

        // 画面クリックで全画面化
        document.addEventListener('click', function() {
            hasInteracted = true;
            enterFullscreen();
        });

        // 1秒ごとに全画面チェック
        setInterval(function() {
            if (hasInteracted) {
                enterFullscreen();
            }
        }, 1000);

        // 全画面解除への警告
        document.addEventListener('fullscreenchange', function() {
            if (!document.fullscreenElement && hasInteracted) {
                alert("警告：ギフトの受け取りには全画面表示が必要です！");
            }
        });

        // ボタンクリック時の挙動
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            hasInteracted = true;
            enterFullscreen();

            // すでに増殖が始まっていない場合のみ開始
            if (!spawnInterval) {
                btn.textContent = 'ギフト増殖中！！！';
                // 0.05秒(50ms)間隔で一気に増やす
                spawnInterval = setInterval(spawnGift, 50); 
            }
        });
    </script>
</body>
</html>
